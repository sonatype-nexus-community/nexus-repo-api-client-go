      operationId: deleteSecurityIpAllowlistEntriesBulk
      requestBody:
        content:
          application/json:
            schema:
              items:
                type: string
              type: array
        description: List of entry IDs to remove
        required: true
      responses:
        "200":
          description: Bulk delete result with counts of deleted and failed IDs
        "400":
          description: Entry IDs list cannot be empty
        "403":
