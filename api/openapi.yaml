            application/json:
              schema:
                $ref: "#/components/schemas/TaskTemplateXO"
          description: default response
      summary: Get task template by type. This is the base to create new tasks
      tags:
      - Tasks
  /v1/tasks/{id}:
    delete:
      operationId: deleteTasks
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        default:
          content:
            application/json: {}
          description: default response
      summary: Delete task by id
      tags:
      - Tasks
    get:
      operationId: getTasks
      parameters:
      - description: Id of the task to get
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "404":
          description: Task not found
      summary: Get a single task by id
      tags:
      - Tasks
  /v1/tasks/{id}/run:
    post:
      operationId: createTasksRun
      parameters:
      - description: Id of the task to run
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Task was run
        "404":
          description: Task not found
        "405":
          description: Task is disabled
      summary: Run task
      tags:
      - Tasks
  /v1/tasks/{id}/stop:
    post:
      operationId: createTasksStop
      parameters:
      - description: Id of the task to stop
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Task was stopped
        "404":
          description: Task not found
        "409":
          description: Unable to stop task
      summary: Stop task
      tags:
      - Tasks
  /v1/tasks/{taskId}:
    put:
      operationId: updateTasks
      parameters:
      - explode: false
        in: path
        name: taskId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/updateTasks_request"
        required: true
      responses:
        default:
          content:
            application/json: {}
          description: default response
      summary: Update an existing task
      tags:
      - Tasks
  /v1/usage-history:
    get:
      description: Returns historical usage metrics for the specified metric type
        and period. Used for rendering sparkline charts in the dashboard.
      operationId: listUsageHistory
      parameters:
      - description: "Metric type: 'requests' or 'components'"
        explode: true
        in: query
        name: metric
        required: true
        schema:
          type: string
        style: form
      - description: "Period: 'daily' (last 7 days) or 'monthly' (last 12 months)"
        explode: true
        in: query
        name: period
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          description: Usage history retrieved successfully
        "400":
          description: Invalid metric or period specified
        "403":
          description: Insufficient permissions
      summary: Get usage history for sparklines
      tags:
      - Usage History
