      operationId: deleteTags
      parameters:
      - description: Name of the tag to delete
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Tag was deleted
        "404":
          description: Tag not found
      summary: Delete a tag
      tags:
      - Tags
    get:
      operationId: getTags
      parameters:
      - description: Name of the tag to retrieve
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "404":
          description: Tag not found
      summary: Get a tag
      tags:
      - Tags
    put:
      operationId: updateTags
      parameters:
      - explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BaseTagXO"
        required: true
      responses:
        "400":
          description: Bad request. Check tag attributes. The attributes is a JSON
            document which cannot exceed 20k
        "404":
          description: Tag not found
      summary: Update a tags attributes
      tags:
      - Tags
