  /v1/security/ip-allowlist/entries:
    delete:
      operationId: deleteSecurityIpAllowlistEntries
      parameters:
      - description: Must be 'true' to confirm the destructive operation
        explode: true
        in: query
        name: confirm
        required: true
        schema:
          type: boolean
        style: form
      responses:
        "204":
          description: All entries cleared successfully
        "400":
          description: confirm=true query parameter is required to prevent accidental
            data loss
        "403":
          description: Insufficient permissions to clear entries
      summary: Clear all entries from the IP Allow List
      tags:
      - "Security: IP Allow List"
    get:
      operationId: listSecurityIpAllowlistEntries
      parameters:
      - description: Page number (0-based)
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 0
          format: int32
          type: integer
        style: form
      - description: Number of entries per page
        explode: true
        in: query
        name: pageSize
        required: false
        schema:
          default: 20
          format: int32
          type: integer
        style: form
      - description: "Search query (matches against IP address, CIDR notation, and\
          \ description)"
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IpAllowListEntriesPageXO"
          description: Entries retrieved successfully
        "400":
          description: Invalid pagination parameters
        "403":
          description: Insufficient permissions to view entries
      summary: Get paginated list of IP Allow List entries with optional search filter
      tags:
      - "Security: IP Allow List"
    post:
      operationId: createSecurityIpAllowlistEntries
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryXO"
        description: Entry to add
        required: true
      responses:
        "201":
          description: Entry added successfully
        "400":
          description: Invalid IP address or CIDR notation
        "403":
          description: Insufficient permissions to add entries
        "409":
          description: Entry already exists or would exceed maximum entries limit
      summary: Add a new entry to the IP Allow List
      tags:
      - "Security: IP Allow List"
