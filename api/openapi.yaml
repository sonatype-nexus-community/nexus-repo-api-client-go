  /v1/search/suggest:
    get:
      description: Returns lightweight component suggestions matching the query. Optimized
        for fast typeahead with minimal response payload.
      operationId: listSearchSuggest
      parameters:
      - description: Search query (minimum 2 characters)
        explode: true
        in: query
        name: q
        required: true
        schema:
          type: string
        style: form
      - description: "Filter by format (e.g., maven2, npm, pypi)"
        explode: true
        in: query
        name: format
        required: false
        schema:
          type: string
        style: form
      - description: "Maximum number of suggestions (default: 10, max: 20)"
        explode: true
        in: query
        name: limit
        required: false
        schema:
          format: int32
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SuggestXO"
                type: array
          description: Suggestions returned successfully
        "400":
          description: Query too short (minimum 2 characters)
      summary: Get search suggestions for autocomplete
      tags:
      - Search
  /v1/secrets/encryption/re-encrypt:
    put:
      description: "Ensure all nodes have access to the key, and they use the same\
        \ key"
      operationId: updateSecretsEncryptionReEncrypt
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReEncryptionRequestApiXO"
      responses:
        "202":
          description: Re-encrypt task successfully submitted
        "400":
          description: "Invalid request. See the response for more information. Possible\
            \ causes: The key is not available to all nodes, upgrade needed or empty\
            \ key id."
        "403":
          description: Insufficient permissions to re-encrypt secrets
        "409":
          description: Re-encryption task in progress.
      summary: Re-encrypt secrets using the specified key
      tags:
      - "Security management: secrets encryption"
  /v1/security/anonymous:
