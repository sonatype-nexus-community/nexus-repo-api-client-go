  /v1/security/user-tokens/tokens:
    get:
      description: "Without 'namecode': lists all tokens with optional realm/userId\
        \ filters and pagination. Returns metadata only — passCode is never returned.\
        \ With 'namecode': switches to single-token lookup mode. Returns a single\
        \ UserTokenXO (200) if the nameCode exists (expired tokens included), or 404\
        \ if not found. The userId, includeExpired, skip, and limit parameters are\
        \ ignored in lookup mode."
      operationId: listSecurityUserTokensTokens
      parameters:
      - description: Filter by realm (optional). Also acts as a realm constraint in
          namecode lookup mode.
        explode: true
        in: query
        name: realm
        required: false
        schema:
          type: string
        style: form
      - description: Filter by user ID (optional). Ignored when 'namecode' is provided.
        explode: true
        in: query
        name: userId
        required: false
        schema:
          type: string
        style: form
      - description: "Look up the token owner by nameCode. When present, the endpoint\
          \ resolves a single token and returns 404 if not found. Expired tokens are\
          \ always included in lookup results."
        explode: true
        in: query
        name: namecode
        required: false
        schema:
          type: string
        style: form
      - description: "Include expired tokens in list results (default: false). Ignored\
          \ in namecode lookup mode — expired tokens are always included."
        explode: true
        in: query
        name: includeExpired
        required: false
        schema:
          type: boolean
        style: form
      - description: "Number of items to skip for pagination (default: 0). Ignored\
          \ in lookup mode."
        explode: true
        in: query
        name: skip
        required: false
        schema:
          format: int32
          type: integer
        style: form
      - description: "Maximum number of items to return (default: 25, max: 100). Ignored\
          \ in lookup mode."
        explode: true
        in: query
        name: limit
        required: false
        schema:
          format: int32
          type: integer
        style: form
      responses:
        "200":
          description: Success. In list mode (no 'namecode' param) returns UserTokenListXO.
            In lookup mode ('namecode' present) returns a single UserTokenXO.
        "400":
          description: "Invalid request parameters, or user token capability is disabled."
        "403":
          description: Insufficient privileges to view or audit user tokens.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleApiResponse"
          description: No user token found with the given namecode. Only returned
            when 'namecode' is provided.
        "500":
          description: Unexpected server error. Please try again later.
      summary: List user tokens or look up a token owner by namecode
      tags:
      - "Security management: user tokens"
