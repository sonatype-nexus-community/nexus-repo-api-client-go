        required: false
        schema:
          type: string
        style: form
      - allowEmptyValue: true
        description: "The field to sort the results against, if left empty, a sort\
          \ based on match weight will be used."
        explode: true
        in: query
        name: sort
        required: false
        schema:
          enum:
          - group
          - name
          - version
          - repository
          type: string
        style: form
      - allowEmptyValue: true
        description: "The direction to sort records in, defaults to ascending ('asc')\
          \ for all sort fields, except version, which defaults to descending ('desc')"
        explode: true
        in: query
        name: direction
        required: false
        schema:
          enum:
          - asc
          - desc
          type: string
        style: form
      - allowEmptyValue: true
        description: "How long to wait for search results in seconds. If this value\
          \ is not provided, the system default timeout will be used."
        explode: true
        in: query
        name: timeout
        required: false
        schema:
          format: int32
          type: integer
        style: form
      - description: Query by keyword
        explode: true
        in: query
        name: q
        required: false
        schema:
          type: string
        style: form
      - description: Repository name
        explode: true
        in: query
        name: repository
        required: false
        schema:
          type: string
        style: form
      - description: Repository name
        explode: true
        in: query
        name: repositoryName
        required: false
        schema:
          type: string
        style: form
      - description: Query by format
