openapi: 3.0.1
info:
  contact:
    name: Sonatype Community Maintainers
    url: https://github.com/sonatype-nexus-community
  description: "This documents the available APIs into [Sonatype Nexus Repository\
    \ Manager](https://www.sonatype.com/products/sonatype-nexus-repository) as of\
    \ version 3.94.0-12."
  license:
    name: Apache-2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Sonatype Nexus Repository Manager
  version: 3.94.0-12
servers:
- url: /service/rest
security:
- BasicAuth: []
tags:
- description: Search suggestions for autocomplete
  name: Search
paths:
  /beta/data-store:
    get:
      operationId: listDataStore
      responses:
        "200":
          description: Data Store configuration returned
        "403":
          description: Authentication required
      summary: Get the data store
      tags:
      - Data Store
    put:
      operationId: updateDataStore
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataStoreApiUpdateXO"
      responses:
        "204":
          description: Data Store configuration updated
        "400":
          description: Update Failed
        "403":
          description: Authentication required
      summary: Update the data store
      tags:
      - Data Store
  /beta/status/check/cluster:
    get:
      operationId: listStatusCheckCluster
      responses:
        "403":
          description: Insufficient permissions to retrieve system status checks
      summary: Health check endpoint that returns the results of the system status
        checks
      tags:
      - Status
  /beta/status/check/{nodeId}:
    get:
      operationId: getStatusCheck
      parameters:
      - description: Node Id
        explode: false
        in: path
        name: nodeId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: The system status check results
        "404":
          description: System status information not found
      summary: Health check endpoint that returns the results of the system status
        checks of specified Node
      tags:
      - Status
  /beta/system/information:
    get:
      operationId: listSystemInformation
      responses:
        "200":
          description: System information for all running nodes grouped by nodeID
        "403":
          description: Insufficient permissions to request this data
      summary: Get information about all nodes
      tags:
      - "System: Nodes"
  /internal/cleanup-policies:
    get:
      description: "Returns all configured cleanup policies sorted by name. Pass the\
        \ optional `format` query parameter to return only policies for that format\
        \ (e.g. `maven2`, `npm`, `docker`); omit it or pass `*` to return policies\
        \ across all formats. Each entry includes the policy definition and the number\
        \ of repositories currently using it."
      operationId: listInternalCleanupPolicies
      parameters:
      - explode: true
        in: query
        name: format
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/CleanupPolicyXO"
                type: array
          description: Cleanup policies matching the request
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
      summary: List cleanup policies
      tags:
      - Cleanup policies
    post:
      description: "Creates a new cleanup policy with the supplied name, format, and\
        \ criteria. The policy name must be unique. At least one criterion (`criteriaLastBlobUpdated`,\
        \ `criteriaLastDownloaded`, or `criteriaAssetRegex`) is required. Only criteria\
        \ supported by the selected format are accepted; unsupported criteria are\
        \ rejected. The created policy is returned with an `inUseCount` of 0."
      operationId: createInternalCleanupPolicies
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanupPolicyXO"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupPolicyXO"
          description: Policy created
        "400":
          description: "Invalid payload (unknown format, missing/invalid criteria,\
            \ or unsupported criterion for the format)"
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
        "409":
          description: A policy with the given name already exists
      summary: Create a cleanup policy
      tags:
      - Cleanup policies
  /internal/cleanup-policies/{name}:
    delete:
      operationId: deleteInternalCleanupPolicies
      parameters:
      - explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        default:
          content:
            application/json: {}
          description: default response
      tags:
      - Cleanup policies
    get:
      operationId: getInternalCleanupPolicies
      parameters:
      - explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupPolicyXO"
          description: default response
      tags:
      - Cleanup policies
    put:
      operationId: updateInternalCleanupPolicies
      parameters:
      - explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanupPolicyXO"
        required: true
      responses:
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupPolicyXO"
          description: default response
      tags:
      - Cleanup policies
  /internal/ui/api/permissions:
    get:
      operationId: listInternalUiApiPermissions
      parameters:
      - explode: true
        in: query
        name: method
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: path
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: permission
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: tag
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPermissionsResponse"
          description: Permission map
        "401":
          description: Not authenticated
        "403":
          description: Missing nexus:settings:read
        "500":
          description: Registry unavailable
      summary: List REST endpoints with permission metadata for the API documentation
        UI
      tags:
      - "Internal UI: API permissions"
  /internal/ui/security/access-check:
    post:
      operationId: createInternalUiSecurityAccessCheck
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiAccessCheckXo"
        description: Access check request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiAccessResultXo"
          description: Access check result
        "400":
          description: "Invalid request - userId and roleId are mutually exclusive,\
            \ or missing required fields"
        "403":
          description: Insufficient permissions to perform access check
        "404":
          description: User or role not found
      summary: Check if a user or role has access to an API endpoint
      tags:
      - "Security management: API access"
  /v1/apikeys/encryption/re-encrypt:
    put:
      description: "Ensure all nodes have access to the key, and they use the same\
        \ key"
      operationId: updateApikeysEncryptionReEncrypt
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeysReEncryptionRequestApiXO"
      responses:
        "202":
          description: Re-encrypt task successfully submitted
        "400":
          description: "Invalid request. See the response for more information. Possible\
            \ causes: The key is not available to all nodes, upgrade needed or empty\
            \ key id."
        "403":
          description: Insufficient permissions to re-encrypt secrets
        "409":
          description: Re-encryption task in progress.
      summary: Re-encrypt api keys principals using the specified configuration
      tags:
      - "Security management: api keys principals encryption"
  /v1/assets:
    get:
      operationId: listAssets
      parameters:
      - description: "A token returned by a prior request. If present, the next page\
          \ of results are returned"
        explode: true
        in: query
        name: continuationToken
        required: false
        schema:
          type: string
        style: form
      - description: Repository from which you would like to retrieve assets.
        explode: true
        in: query
        name: repository
        required: true
        schema:
          type: string
        style: form
      responses:
        "403":
          description: Insufficient permissions to list assets
        "422":
          description: Parameter 'repository' is required
      summary: List assets
      tags:
      - assets
  /v1/assets/{id}:
    delete:
      operationId: deleteAssets
      parameters:
      - description: Id of the asset to delete
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Asset was successfully deleted
        "403":
          description: Insufficient permissions to delete asset
        "404":
          description: Asset not found
        "422":
          description: Malformed ID
      summary: Delete a single asset
      tags:
      - assets
    get:
      operationId: getAssets
      parameters:
      - description: Id of the asset to get
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "403":
          description: Insufficient permissions to get asset
        "404":
          description: Asset not found
        "422":
          description: Malformed ID
      summary: Get a single asset
      tags:
      - assets
  /v1/azureblobstore/test-connection:
    post:
      operationId: createAzureblobstoreTestConnection
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AzureConnectionXO"
        required: true
      responses:
        "204":
          description: Azure Blob Store connection was successful
        "400":
          description: Azure Blob Store connection failed
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
      summary: Verify connection using supplied Azure Blob Store settings
      tags:
      - Azure blob store
  /v1/blobstores:
    get:
      operationId: listBlobstores
      responses:
        default:
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/GenericBlobStoreApiResponse"
                type: array
          description: default response
      summary: List the blob stores
      tags:
      - Blob store
  /v1/blobstores/azure:
    post:
      operationId: createBlobstoresAzure
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AzureBlobStoreApiModel"
      responses:
        "201":
          description: Azure blob store created
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
      summary: Create an Azure blob store
      tags:
      - Blob store
  /v1/blobstores/azure/{name}:
    get:
      operationId: getBlobstoresAzure
      parameters:
      - description: Name of the blob store configuration to fetch
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AzureBlobStoreApiModel"
          description: Success
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
        "404":
          description: Specified Azure blob store doesn't exist
      summary: Get an Azure blob store configuration by name
      tags:
      - Blob store
    put:
      operationId: updateBlobstoresAzure
      parameters:
      - description: Name of the blob store to update
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AzureBlobStoreApiModel"
      responses:
        "204":
          description: Azure blob store updated
        "400":
          description: Specified Azure blob store doesn't exist
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
      summary: Update an Azure blob store configuration by name
      tags:
      - Blob store
  /v1/blobstores/file:
    post:
      operationId: createBlobstoresFile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileBlobStoreApiCreateRequest"
      responses:
        "204":
          description: Success
        "403":
          description: Insufficient permissions
      summary: Create a file blob store
      tags:
      - Blob store
  /v1/blobstores/file/{name}:
    get:
      operationId: getBlobstoresFile
      parameters:
      - description: The name of the file blob store to read
        example: default
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileBlobStoreApiModel"
          description: Success
        "403":
          description: Insufficient permissions
        "404":
          description: Blob store not found
      summary: Get a file blob store configuration by name
      tags:
      - Blob store
    put:
      operationId: updateBlobstoresFile
      parameters:
      - description: The name of the file blob store to update
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileBlobStoreApiUpdateRequest"
      responses:
        "204":
          description: Success
        "403":
          description: Insufficient permissions
        "404":
          description: Blob store not found
      summary: Update a file blob store configuration by name
      tags:
      - Blob store
  /v1/blobstores/google:
    post:
      operationId: createBlobstoresGoogle
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleCloudBlobstoreApiModel"
      responses:
        "201":
          description: Google Cloud blob store created
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
      summary: Create a Google Cloud blob store
      tags:
      - Blob store
  /v1/blobstores/google/regions/{projectId}:
    get:
      operationId: getBlobstoresGoogleRegions
      parameters:
      - description: projectId
        explode: false
        in: path
        name: projectId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
          description: List of regions found
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
        "404":
          description: Project not found
      summary: Get the project regions by project's id
      tags:
      - Blob store
  /v1/blobstores/google/{name}:
    get:
      operationId: getBlobstoresGoogle
      parameters:
      - description: the name of the blob store
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleCloudBlobstoreApiModel"
          description: Google Cloud blob store configuration
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
        "404":
          description: Repository not found
      summary: Get the configuration for a Google Cloud blob store
      tags:
      - Blob store
    put:
      operationId: updateBlobstoresGoogle
      parameters:
      - description: the name of the blobstore
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleCloudBlobstoreApiModel"
      responses:
        "204":
          description: Google Cloud blob store updated
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
        "404":
          description: Repository not found
      summary: Update a Google Cloud blob store
      tags:
      - Blob store
  /v1/blobstores/group:
    post:
      operationId: createBlobstoresGroup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupBlobStoreApiCreateRequest"
      responses:
        "204":
          description: Success
        "403":
          description: Insufficient permissions
      summary: Create a group blob store
      tags:
      - Blob store
  /v1/blobstores/group/convert/{name}/{newNameForOriginal}:
    post:
      operationId: createBlobstoresGroupConvert
      parameters:
      - description: The name of the group blob store
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: A new name to the original blob store
        explode: false
        in: path
        name: newNameForOriginal
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupBlobStoreApiModel"
          description: Success
        "403":
          description: Insufficient permissions
        "404":
          description: Blob store not found
      summary: Convert a blob store to a group blob store
      tags:
      - Blob store
  /v1/blobstores/group/{name}:
    get:
      operationId: getBlobstoresGroup
      parameters:
      - description: The name of the group blob store
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupBlobStoreApiModel"
          description: Success
        "403":
          description: Insufficient permissions
        "404":
          description: Blob store not found
      summary: Get a group blob store configuration by name
      tags:
      - Blob store
    put:
      operationId: updateBlobstoresGroup
      parameters:
      - description: The name of the blob store to update
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupBlobStoreApiUpdateRequest"
      responses:
        "204":
          description: Success
        "403":
          description: Insufficient permissions
        "404":
          description: Blob store not found
      summary: Update a group blob store configuration by name
      tags:
      - Blob store
  /v1/blobstores/s3:
    post:
      operationId: CreateS3BlobStore
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/S3BlobStoreApiModel"
      responses:
        "201":
          description: S3 blob store created
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
      summary: Create an S3 blob store
      tags:
      - Blob store
  /v1/blobstores/s3/{name}:
    get:
      operationId: GetS3BlobStore
      parameters:
      - description: Name of the blob store configuration to fetch
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/S3BlobStoreApiModel"
          description: Success
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
        "404":
          description: Specified S3 blob store doesn't exist
      summary: Get a S3 blob store configuration by name
      tags:
      - Blob store
    put:
      operationId: UpdateS3BlobStore
      parameters:
      - description: Name of the blob store to update
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/S3BlobStoreApiModel"
      responses:
        "204":
          description: S3 blob store updated
        "400":
          description: Specified S3 blob store doesn't exist
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
      summary: Update an S3 blob store configuration by name
      tags:
      - Blob store
  /v1/blobstores/{name}:
    delete:
      operationId: deleteBlobstores
      parameters:
      - description: The name of the blob store to delete
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        default:
          content:
            application/json: {}
          description: default response
      summary: Delete a blob store by name
      tags:
      - Blob store
  /v1/blobstores/{name}/quota-status:
    get:
      operationId: getBlobstoresQuotaStatus
      parameters:
      - explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlobStoreQuotaResultXO"
          description: default response
      summary: Get quota status for a given blob store
      tags:
      - Blob store
  /v1/capabilities:
    get:
      operationId: listCapabilities
      responses:
        default:
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/CapabilityDTO"
                type: array
          description: default response
      summary: List the active capabilities
      tags:
      - Capabilities
    post:
      operationId: createCapabilities
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapabilityDTO"
      responses:
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilityDTO"
          description: default response
      summary: Create a capability
      tags:
      - Capabilities
  /v1/capabilities/types:
    get:
      operationId: listCapabilitiesTypes
      responses:
        default:
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/CapabilityTypeDTO"
                type: array
          description: default response
      summary: List all capability types available and exposed in the system
      tags:
      - Capabilities
  /v1/capabilities/{capabilityId}:
    delete:
      operationId: deleteCapabilities
      parameters:
      - description: capabilityId
        explode: false
        in: path
        name: capabilityId
        required: true
        schema:
          type: string
        style: simple
      responses:
        default:
          content:
            application/json: {}
          description: default response
      summary: Delete a capability
      tags:
      - Capabilities
    put:
      operationId: updateCapabilities
      parameters:
      - description: capabilityId
        explode: false
        in: path
        name: capabilityId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapabilityDTO"
        description: capability
      responses:
        default:
          content:
            application/json: {}
          description: default response
      summary: Update a capability
      tags:
      - Capabilities
  /v1/cleanup/run:
    post:
      description: |-
        Runs cleanup on the specified `repository` against the policies attached to it. Behavior depends on the `dryRun` flag in the request body:

        - `dryRun: true` — Synchronously evaluates the policies and returns **200 OK** with a `CleanupExecutionStatusXO` whose `componentCount` is the number of components that *would* be deleted. No components are removed.
        - `dryRun: false` — Schedules an asynchronous deletion and returns **202 Accepted** immediately with a `CleanupExecutionStatusXO` containing the generated execution `id` and `status=RUNNING`. Poll `GET /service/rest/v1/cleanup/run/{id}` to observe the terminal `COMPLETED` or `FAILED` state and the final `componentsDeleted` count. Execution records are retained for 24 hours.

        At most one non-dry-run cleanup may be `RUNNING` per repository. A second non-dry-run submitted while one is in progress is rejected with **409 Conflict** and the body of the existing execution's status.
      operationId: createCleanupRun
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanupExecutionRequestXO"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupExecutionStatusXO"
          description: Dry run completed; `componentCount` reports how many components
            match
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupExecutionStatusXO"
          description: "Async cleanup accepted; use the returned `id` with GET /cleanup/run/{id}\
            \ to poll for status"
        "400":
          description: Invalid request body (missing `repository`)
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
        "404":
          description: The specified repository does not exist
        "409":
          content:
            application/json:
              schema:
